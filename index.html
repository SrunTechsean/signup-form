<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="style.css">
        <title>Sign-up Form</title>
    </head>
    <body>
        <main class="auth-page">
            <aside class="auth-page__illustration"></aside>
            <section class="auth-page__form">
                <form action="" class="signup-form">
                    <h1 class="signup-form__caption">Sign Up SeanTrack</h1>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="first_name">
                            First name
                        </label>
                        <input
                            required
                            class="signup-form__input required"
                            type="text"
                            id="first_name"
                            name="first_name"
                            autocomplete="on"
                            placeholder="First name"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="last_name">
                            Last name
                        </label>
                        <input
                            required
                            class="signup-form__input required"
                            type="text"
                            id="last_name"
                            name="last_name"
                            placeholder="Last name"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="email">Email</label>
                        <input
                            required
                            class="signup-form__input required"
                            type="email"
                            id="email"
                            name="email"
                            autocomplete="on"
                            placeholder="Email"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="phone_number">Phone</label>
                        <input
                            required
                            class="signup-form__input required"
                            type="tel"
                            id="phone_number"
                            name="phone_number"
                            placeholder="Phone"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="password">Password</label>
                        <input
                            required
                            class="signup-form__input required"
                            type="text"
                            id="password"
                            name="password"
                            placeholder="Password"
                            pattern=". {3,}"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__field">
                        <label class="signup-form__label" for="confirm_password">
                            Confirm Password
                        </label>
                        <input
                            required
                            class="signup-form__input required"
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Confirm Password"
                            pattern=". {3,}"
                        >
                        <span class="signup-form__required"></span>
                    </div>
                    <div class="signup-form__submit">
                        <button class="btn btn--primary" type="submit">
                            Create Account
                        </button>
                        <span class="signup-form__question">
                            Already have an account? <a class="link" href="#">LOG IN</a>
                        </span>
                    </div>
                </form>
            </section>
        </main>
    </body>
</html>
